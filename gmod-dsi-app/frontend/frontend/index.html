<!DOCTYPE html>
<html lang="de" class="w-[100%] h-[100%]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GMod DSI</title>
    <link href="style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body class="bg-[#275D8F] w-[100%] h-[100%]">
    <div
      class="radial-menu-container flex items-center justify-center h-full w-full"
    >
      <div
        class="radial-menu-items-container absolute flex justify-center h-full w-full left-0 top-0"
        style="pointer-events: none"
      >
        <div
          class="radial-menu-items relative w-full h-full flex items-center justify-center"
        >
          <!-- Menu items will be generated by JavaScript -->
        </div>
      </div>
      <div
        class="radial-menu-center block bg-[#4283BF] h-80 w-80 rounded-[80%] outline-2 outline-[#212121]"
      >
        <button class="radial-menu-toggle p-2 w-full h-full rounded-[80%]">
          <img src="assets/server-rack.png" />
        </button>
      </div>
    </div>
    <div id="gamemode-selection" class="flex flex-wrap justify-center">
      <!-- Gamemode Cards will be inserted here -->
    </div>
    <script src="script.js"></script>
  </body>
</html>
