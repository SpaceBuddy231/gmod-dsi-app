<!DOCTYPE html>
<html lang="en" class="w-[100%] h-[100%]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTT Configuration</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#275D8F] w-full h-full">
    <div
      id="topbar"
      class="bg-[#4283BF] w-full h-[12%] flex items-center border-b-2 border-[#212121] shadow-sm"
    >
      <div
        id="logo"
        class="h-full flex items-center border-r-2 border-[#212121]"
      >
        <img
          src="assets/ttt.png"
          class="h-[80%] m-4 max-h-full w-auto object-contain"
        />
      </div>

      <div id="title-container">
        <h1
          id="title"
          class="font-['Rubik'] font-semibold text-4xl md:text-5xl lg:text-6xl m-4 underline text-[#212121]"
        >
          TTT
        </h1>
      </div>
    </div>
    <!-- TOPBAR -->

    <div
      id="control-panel-container"
      class="w-[100%] h-[70%] flex flex-col p-5"
    >
      <div id="upper-part" class="h-full">
        <div
          id="install-dir-container"
          class="w-full h-[15%] justify-center flex flex-col items-center mt-[3%]"
        >
          <p class="font-[Rubik] font-medium text-xl">Installation Directory</p>
          <div
            id="inputfield-container"
            class="w-[50%] flex-1 bg-[#4283BF] border-2 rounded-full"
          ></div>
        </div>
        <div
          id="install-dir-container"
          class="w-full h-[15%] justify-center flex flex-col items-center mt-[6%]"
        >
          <p class="font-[Rubik] font-medium text-xl">Servername</p>
          <div
            id="inputfield-container"
            class="w-[50%] flex-1 bg-[#4283BF] border-2 rounded-full"
          ></div>
        </div>
      </div>
      <div id="bottom-part" class="flex justify-center items-center p-4">
        <button
          id="start-button"
          class="bg-[#4283BF] text-[#212121] font-['Rubik'] font-medium px-12 py-5 text-2xl rounded-lg border-2 border-[#212121] hover:bg-[#3a75ab] transition-colors duration-200"
        >
          Start
        </button>
      </div>
    </div>

    <script src="ttt.js"></script>
  </body>
</html>
